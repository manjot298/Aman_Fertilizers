    <style>
    /* 1. Layout & Header Styles */
    .header-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 6px;
        margin-right: 48px;
        text-align: center;
        align-items: center;
    }

    .center-img {
        display: block;
        margin-top: 0; /* Adjusted for flex alignment */
    }

    /* 2. Table Styles */
    .grid-table {
        width: 100%;
        border-collapse: separate; 
        border-spacing: 10px; 
    }

    .grid-table th, 
    .grid-table td {
        border: 2px solid black; 
        padding: 15px;
        border-radius: 8px; 
    }

    .left { text-align: left; }
    .center { text-align: center; }
    .right { text-align: right; }
    
    table {
        table-layout: fixed; 
        width: 550px;        
        margin: 0 auto; /* Centers the table on the page */
        border-collapse: separate;
        border-spacing: 10px;
    }

    th, td {
        border: 2px solid black;
        height: 70px;       
        padding: 10px;
        overflow: hidden;    
    }

    /* 3. Default Styles (Light Mode) */
    body {
        background-color: white;
        color: black;
        transition: 0.3s;
    }

    #Btn-color {
        background-color: black;
        color: white;
        padding: 10px 20px;
        border: none;
        cursor: pointer;
        border-radius: 13px;
        transition: all 0.4s ease;
        border: 2px solid transparent;
        font-weight: bold;
        position: fixed;
        top: 20px;
        left: 16px;
    }

    #Btn-color:hover {
        background-color: rgb(71, 190, 230);
        transform: scale(1.1);
    }

    #Btn-scroll {
        background-color: black;
        color: white;
        padding: 10px 20px;
        border: none;
        cursor: pointer;
        border-radius: 13px;
        transition: all 0.4s ease;
        border: 2px solid transparent;
        font-weight: bold;
        position: fixed;
        top: 20px;
        right: 16px;
    }

    #Btn-scroll:hover {
        background-color: rgb(245, 13, 13);
        transform: scale(1.1);
    }

    #H{
        transition: all 0.4s ease;
    }
    #H:hover {
        background-color: rgb(13, 114, 245);
        transform: scale(1.1);
    }
    /* 4. Dark Mode Styles */
    .dark-mode {
        background-color: #121212;
        color: white;
    }

    .dark-mode .grid-table td,
    .dark-mode .grid-table th {
        border-color: white;
        color: white;
    }

    .dark-mode #Btn-color, .dark-mode #Btn-scroll {
        background-color: white;
        color: black;
    }

    .dark-mode #Btn-color:hover {
        background-color: rgb(69, 193, 234);
    }
    .dark-mode #Btn-scroll:hover {
        background-color: rgb(245, 13, 13);
    }
    </style>
</head>

    <script>
    function toggleDarkMode() {
        document.body.classList.toggle("dark-mode");
    }

    document.addEventListener("keydown", function(event) {
        if (event.key === "`") {
            document.getElementById("Btn-color").click();
        }
    });

    const btn = document.getElementById("Btn-scroll");
    window.onscroll = function(){
        const isBottom = (window.innerHeight + window.pageYOffset) >= document.body.offsetHeight - 2;
        btn.innerText = isBottom ? "Scroll to Top" : "Scroll to End";
    };

    function handleScroll() {
        const isBottom = (window.innerHeight + window.pageYOffset) >= document.body.offsetHeight - 2;
        if(isBottom){
            window.scrollTo({ top: 0, behavior: 'smooth'});
        } else {
            window.scrollTo({ top : document.body.scrollHeight, behavior: 'smooth'});
        }
    }
    </script>
